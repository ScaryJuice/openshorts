version: '3.8'

services:
  openshorts:
    build: .
    ports:
      - "7875:7875"
    volumes:
      - ./openshorts_clips:/app/openshorts_clips
      - ./openshorts_config.json:/app/openshorts_config.json
    environment:
      - GRADIO_SERVER_NAME=0.0.0.0
      - GRADIO_SERVER_PORT=7875
    restart: unless-stopped

  # Optional: Ollama service for AI features
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

volumes:
  ollama_data: