services:
  openshorts:
    build: .
    ports:
      - "7875:7875"
    volumes:
      - ./openshorts_clips:/app/openshorts_clips
      - ./openshorts_config.json:/app/openshorts_config.json
    environment:
      - GRADIO_SERVER_NAME=0.0.0.0
      - GRADIO_SERVER_PORT=7875
      - OLLAMA_HOST=http://ollama:11434
    depends_on:
      - ollama
    restart: unless-stopped

  # Ollama service for AI features
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_ORIGINS=*
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Initialize Ollama with required models
  ollama-init:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=http://ollama:11434
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command: |
      "echo 'Waiting for Ollama to be ready...' &&
       sleep 10 &&
       OLLAMA_HOST=http://ollama:11434 ollama pull llama3.2 &&
       echo 'Model llama3.2 successfully downloaded!'"
    restart: "no"

volumes:
  ollama_data: